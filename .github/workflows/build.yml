name: build-apk

on:
  push:
    branches: [ main ]
    paths:
      - 'extension/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        working-directory: extension
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Stage APK
        run: cp extension/app/build/outputs/apk/debug/app-debug.apk trip-companion-${{ github.run_number }}.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: "Trip Companion build ${{ github.run_number }}. Open the app on the Karoo → Check for update."
          files: trip-companion-${{ github.run_number }}.apk
