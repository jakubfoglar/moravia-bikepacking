  .poi { padding:9px 16px; border-bottom:1px solid #f0f0ee; cursor:pointer; display:flex; gap:9px; align-items:flex-start; }

  .poi .body { flex:1; min-width:0; }

  .lp h3 { margin:0 0 3px; font-size:14px; }

  .leaflet-popup-content { width:230px !important; }
  #picks { position:absolute; bottom:0; left:0; width:380px; background:#fff; border-top:1px solid var(--line); padding:8px 16px; font-size:12px; }

  textarea { width:100%; height:70px; font-size:11px; margin-top:6px; display:none; }
  @media (max-width:760px){ #wrap{flex-direction:column;} #side{width:100%;min-width:0;height:46vh;} #map{height:54vh;} #picks{width:100%;} }

ed in beech woods above Podhradí. Marked trails climb past the Starý Světlov castle ruins toward the summit; the ridge is forested rather than a bare overlook, but the shaded tracks are prime bikepacking terrain. ⚠︎ Coordinates approximate.", "photo_url": null, "photo_credit": null, "opening_hours": null, "id": 44, "off_km": 3.62, "day": 2, "detour_km": 7.2}, {"name": "Rozhledna Doubrava (u Vizovic)", "category": "nature", "lat": 49.2472, "lon": 17.8836, "coord_source": "estimate", "confidence": "med", "town": "Loučka / Vizovice", "hook": "55 m mast with a viewing gallery over the Vizovice hills.", "blurb": "A 55 m telecom tower on Doubrava hill (672 m) between Vizovice and Loučka, with a public platform 33 m up (174 steps). The panorama takes in the Vizovické and Hostýnské hills, Zlín, and distant Hostýn, Radhošť and Velká Javořina. Just north of the Vizovice end of the route.", "photo_url": null, "photo_credit": null, "opening_hours": null, "id": 43, "off_km": 3.86, "day": 2, "detour_km": 7.7}, {"name": "Zámek Napajedla", "category": "history", "lat": 49.1694, "lon": 17.5128, "coord_source": "Wikidata", "confidence": "high", "town": "Napajedla", "hook": "Baroque chateau by the workshop of Fischer von Erlach.", "blurb": "This Baroque chateau, attributed to the workshop of Johann Bernhard Fischer von Erlach, anchors the small town of Napajedla just north of Otrokovice. Rebuilt and extended over the 18th–19th centuries, it's surrounded by an English-style landscape park overlooking the Morava valley — near the very end of the route.", "photo_url": "https://commons.wikimedia.org/wiki/Special:FilePath/Napajedla%2C%20budova%20z%C3%A1mku%20od%20v%C3%BDchodu%20(2)%20crop.jpg", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 60, "off_km": 3.96, "day": 2, "detour_km": 7.9}, {"name": "Hřebčín Napajedla (stud farm)", "category": "history", "lat": 49.167, "lon": 17.5143, "coord_source": "address", "confidence": "med", "town": "Napajedla", "hook": "Historic English-thoroughbred stud farm founded 1886.", "blurb": "Founded in 1886 by Aristide Baltazzi, the Napajedla stud became one of Central Europe's most renowned breeders of English thoroughbred racehorses. Its elegant stables and paddocks sit just below the chateau. A distinctive equestrian landmark on the way into Otrokovice.", "photo_url": null, "photo_credit": null, "opening_hours": null, "id": 61, "off_km": 4.18, "day": 2, "detour_km": 8.4}, {"name": "Muzeum J. A. Komenského (Uh. Brod)", "category": "history", "lat": 49.0277, "lon": 17.645, "coord_source": "cs.wikipedia", "confidence": "high", "town": "Uherský Brod", "hook": "National museum to the 'Teacher of Nations'.", "blurb": "Uherský Brod's museum honours Jan Amos Komenský (Comenius), the 17th-century educator tied to this region, with exhibits on his life and pedagogy plus local history. A bronze Komenský statue by Vincenc Makovský marks the entrance. The town's Renaissance square and gates are worth a loop.", "photo_url": "https://upload.wikimedia.org/wikipedia/commons/4/47/Uhersk%C3%BD_Brod%2C_pomn%C3%ADk_J%C3%81K.jpg", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 50, "off_km": 4.91, "day": 2, "detour_km": 9.8}, {"name": "JAMAI CAFE", "category": "cafe", "lat": 49.0255, "lon": 17.647, "coord_source": "business address", "confidence": "med", "town": "Uherský Brod", "hook": "Local roastery café, coffee roasted in town since 2014.", "blurb": "A family specialty-coffee roastery founded in Uherský Brod in 2014, with cafés on the town's central squares serving daily fresh-roasted coffee, loose teas and homemade lemonades. Its beans even supply the lakeside café at the Luhačovice dam. The strongest specialty pick on the western leg.", "photo_url": null, "photo_credit": null, "opening_hours": null, "id": 54, "off_km": 4.97, "day": 2, "detour_km": 9.9}, {"name": "ZOO Zlín-Lešná", "category": "nature", "lat": 49.2722, "lon": 17.715, "coord_source": "wikipedia", "confidence": "high", "town": "Zlín-Lešná", "hook": "One of Czechia's most-visited zoos, in a chateau park.", "blurb": "Spread across a landscaped 50+ hectare park around Lešná Chateau, the zoo is organised by continents and famous for its walk-through Yucatan pavilion and African safari expositions. Consistently among the two or three most-visited zoos in the country. A relaxed nature-and-family stop ~10 km NE of central Zlín. ⚠︎ Check detour distance.", "photo_url": "https://commons.wikimedia.org/wiki/Special:FilePath/Zoo_Zl%C3%ADn_-_main_entrance_01.jpg", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 63, "off_km": 5.25, "day": 2, "detour_km": 10.5}, {"name": "Zámek Lešná", "category": "history", "lat": 49.2733, "lon": 17.7178, "coord_source": "Wikidata", "confidence": "high", "town": "Zlín-Lešná", "hook": "Neo-Renaissance/Tudor chateau at the heart of the zoo park.", "blurb": "The romantic chateau was built 1887–1894 for Count František Seilern. Its richly furnished interiors — coffered ceilings, Renaissance-revival halls and period collections — are open for guided tours. It sits inside the grounds of Zlín's celebrated zoo, about 10 km from the city centre. ⚠︎ Check detour distance.", "photo_url": "https://commons.wikimedia.org/wiki/Special:FilePath/Lesna_castle4.jpg", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 59, "off_km": 5.4, "day": 2, "detour_km": 10.8}, {"name": "Jurkovičův dům (Jurkovič House)", "category": "history", "lat": 49.1065, "lon": 17.7618, "coord_source": "cs.wikipedia", "confidence": "high", "town": "Luhačovice", "hook": "Luhačovice's iconic Art Nouveau folk-style spa house.", "blurb": "Built in 1901–02 by Dušan Jurkovič, this is the signature building of Luhačovice spa, blending Art Nouveau with Moravian-Slovak folk motifs in carved timber and colourful gables. Jurkovič reshaped much of the spa's look, making the town a showcase of his 'folk secese' style. Now a hotel at the heart of the colonnade.", "photo_url": "https://upload.wikimedia.org/wikipedia/commons/d/dd/Jurkovi%C4%8D%C5%AFv_d%C5%AFm_v_Luha%C4%8Dovicich_01.jpg", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 45, "off_km": 5.66, "day": 2, "detour_km": 11.3}, {"name": "Lázeňská kolonáda & Vincentka", "category": "history", "lat": 49.108, "lon": 17.762, "coord_source": "estimate", "confidence": "med", "town": "Luhačovice", "hook": "Free-flowing salty mineral spring in the spa heart.", "blurb": "The colonnade around Lázeňské náměstí is the social core of Luhačovice, where guests sip from the famous alkaline-saline Vincentka spring, prized for respiratory cures. The surrounding ensemble of spa houses — many in Jurkovič's folk-Art-Nouveau idiom — makes this the fourth-largest spa in Czechia.", "photo_url": null, "photo_credit": null, "opening_hours": null, "id": 46, "off_km": 5.76, "day": 2, "detour_km": 11.5}, {"name": "Mercii Caffè", "category": "cafe", "lat": 49.1085, "lon": 17.7608, "coord_source": "business address", "confidence": "med", "town": "Luhačovice", "hook": "Specialty coffee in the spa, listed on European Coffee Trip.", "blurb": "A modern Slovácko-Wallachian café between the colonnade and the dam in Luhačovice, serving specialty coffee alongside homemade pastries and honest Moravian wines. Featured on European Coffee Trip and a reliable specialty stop in a spa town otherwise heavy on traditional cukrárny.", "photo_url": null, "photo_credit": null, "opening_hours": null, "id": 53, "off_km": 5.86, "day": 2, "detour_km": 11.7}, {"name": "Rozhledna Velký Lopeník", "category": "nature", "lat": 48.9167, "lon": 17.7825, "coord_source": "cs.wikipedia", "confidence": "high", "town": "Březová / Strání (Bílé Karpaty)", "hook": "22 m oak tower on the White Carpathians' second-highest peak.", "blurb": "A 22 m wooden lookout opened in 2005 atop Velký Lopeník (911 m), the second-highest summit of the White Carpathians, right on the Czech–Slovak border. On clear days the view reaches across the Bílé Karpaty toward the Chřiby and Javorníky. ⚠︎ A big climb in the far-southern arc — check the detour distance.", "photo_url": "https://commons.wikimedia.org/wiki/Special:FilePath/Velk%C3%BD%20Lopen%C3%ADk%2C%20rozhledna%20%281%29.jpg?width=500", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 42, "off_km": 6.19, "day": 2, "detour_km": 12.4}, {"name": "Luhačovická přehrada (reservoir)", "category": "nature", "lat": 49.1246, "lon": 17.7794, "coord_source": "cs.wikipedia", "confidence": "high", "town": "Pozlovice / Luhačovice", "hook": "Forest-ringed dam lake just above the spa town.", "blurb": "A dam reservoir on the Horní Olšava built in 1930, ringed by wooded hills of the Vizovice highlands. A popular summer spot for swimming, pedal boats and lakeside walks, with a shoreline café near the dam. The gentle 4 km loop around the water is a natural rest point.", "photo_url": "https://upload.wikimedia.org/wikipedia/commons/b/b2/Luha%C4%8Dovice_p%C5%99ehrada_%282%29.JPG", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 41, "off_km": 6.28, "day": 2, "detour_km": 12.6}, {"name": "Poutní kostel Maleniska (Provodov)", "category": "history", "lat": 49.1503, "lon": 17.7479, "coord_source": "cs.wikipedia", "confidence": "high", "town": "Provodov", "hook": "Forest pilgrimage church with a holy spring.", "blurb": "A Baroque pilgrimage church of Our Lady of the Snows tucked in the woods at Maleniska near Provodov, built in the 18th century around a revered healing spring. It remains one of eastern Moravia's active Marian pilgrimage sites — quiet and atmospheric among the trees. A short detour north of the reservoir.", "photo_url": "https://upload.wikimedia.org/wikipedia/commons/3/33/Malenisko.jpg", "photo_credit": "Wikimedia Commons", "opening_hours": null, "id": 49, "off_km": 7.25, "day": 2, "detour_km": 14.5}]};
const map = L.map('map', {scrollWheelZoom:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);

// tracks
const allLatLng = [];
DATA.tracks.forEach(t => {
  const ll = t.line.map(p => [p[0], p[1]]);
  L.polyline(ll, {color:t.color, weight:4, opacity:.75}).addTo(map);
  ll.forEach(x => allLatLng.push(x));
});
map.fitBounds(L.latLngBounds(allLatLng).pad(0.05));

const state = { cats:new Set(Object.keys(DATA.cats)), days:new Set([1,2]), picks:new Set() };
const markers = {};

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function mapsLink(p){ return `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lon}`; }
function mapyLink(p){ return `https://mapy.cz/turisticka?x=${p.lon}&y=${p.lat}&z=16&source=coor&id=${p.lon},${p.lat}`; }

function markerIcon(p, picked){
  const c = DATA.cats[p.category].color;
  const em = DATA.cats[p.category].emoji;
  return L.divIcon({className:'', iconSize:[26,26], iconAnchor:[13,13], html:
    `<div style="width:26px;height:26px;border-radius:50%;background:${c};border:3px solid ${picked?'#ffd400':'#fff'};box-shadow:0 1px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:13px">${em}</div>`});
}
function popupHtml(p){
  const img = p.photo_url ? `<img class="lp-photo" src="${esc(p.photo_url)}" loading="lazy" onerror="this.style.display='none'">` : '';
  const hrs = p.opening_hours ? `<div class="m" style="margin-top:4px">🕒 ${esc(p.opening_hours)}</div>` : '';
  const web = p.website ? `<a href="${esc(p.website)}" target="_blank">Website</a>` : '';
  return `<div class="lp">${img}<h3>${esc(p.name)}</h3>`+
    `<div class="m">${DATA.cats[p.category].emoji} ${esc(DATA.cats[p.category].label)} · ${esc(p.town||'')} · <b>${p.off_km} km</b> off route (Day ${p.day})</div>`+
    `<p>${esc(p.blurb||p.hook||'')}</p>`+ hrs +
    `<div style="margin-top:6px"><a href="${mapsLink(p)}" target="_blank">Google Maps</a><a href="${mapyLink(p)}" target="_blank">Mapy.cz</a>${web}</div>`+
    (p.photo_credit?`<div class="m" style="margin-top:6px">📷 ${esc(p.photo_credit)}</div>`:'')+`</div>`;
}

DATA.pois.forEach(p => {
  const m = L.marker([p.lat,p.lon], {icon:markerIcon(p,false)}).bindPopup(popupHtml(p));
  m.on('click', ()=>{ const el=document.getElementById('poi'+p.id); if(el) el.scrollIntoView({block:'center'}); });
  markers[p.id] = m;
});

function refresh(){
  // markers
  DATA.pois.forEach(p=>{
    const vis = state.cats.has(p.category) && state.days.has(p.day);
    const m = markers[p.id];
    if(vis){ if(!map.hasLayer(m)) m.addTo(map); m.setIcon(markerIcon(p, state.picks.has(p.id))); }
    else if(map.hasLayer(m)) map.removeLayer(m);
  });
  // list
  const list = document.getElementById('list');
  list.innerHTML='';
  DATA.pois.filter(p=>state.cats.has(p.category)&&state.days.has(p.day)).forEach(p=>{
    const c = DATA.cats[p.category].color;
    const row=document.createElement('div'); row.className='poi'; row.id='poi'+p.id;
    row.innerHTML=`<input type="checkbox" ${state.picks.has(p.id)?'checked':''}>`+
      `<div class="body"><div class="nm">${esc(p.name)} <span class="tag" style="background:${c}">${p.off_km}km</span></div>`+
      `<div class="meta">Day ${p.day} · ${esc(p.town||'')} · ${DATA.cats[p.category].emoji} ${esc(DATA.cats[p.category].label)}${p.confidence==='low'?' · ⚠︎ coord?':''}</div>`+
      `<div class="hook">${esc(p.hook||'')}</div></div>`;
    const cb=row.querySelector('input');
    cb.addEventListener('click',e=>{ e.stopPropagation(); toggle(p.id, cb.checked); });
    row.addEventListener('click',()=>{ markers[p.id].openPopup(); map.setView([p.lat,p.lon], Math.max(map.getZoom(),13)); });
    list.appendChild(row);
  });
  document.getElementById('pickcount').textContent = state.picks.size+' picked';
  const chosen = DATA.pois.filter(p=>state.picks.has(p.id));
  document.getElementById('picktext').value = chosen.map(p=>`[Day ${p.day}] ${p.name} (${p.town||''}) — ${p.category}, ${p.off_km}km`).join('\n');
}
function toggle(id, on){ if(on) state.picks.add(id); else state.picks.delete(id); refresh(); }

// filter chips
const cf=document.getElementById('catFilters');
Object.entries(DATA.cats).forEach(([k,v])=>{
  const c=document.createElement('span'); c.className='chip'; c.innerHTML=`<span class="dot" style="background:${v.color}"></span>${v.emoji} ${v.label}`;
  c.onclick=()=>{ if(state.cats.has(k)){state.cats.delete(k);c.classList.add('off');} else {state.cats.add(k);c.classList.remove('off');} refresh(); };
  cf.appendChild(c);
});
const df=document.getElementById('dayFilters');
[[1,'Day 1'],[2,'Day 2']].forEach(([d,lab])=>{
  const c=document.createElement('span'); c.className='chip'; c.textContent=lab;
  c.onclick=()=>{ if(state.days.has(d)){state.days.delete(d);c.classList.add('off');} else {state.days.add(d);c.classList.remove('off');} refresh(); };
  df.appendChild(c);
});
document.getElementById('allBtn').onclick=()=>{ DATA.pois.forEach(p=>state.picks.add(p.id)); refresh(); };
document.getElementById('noneBtn').onclick=()=>{ state.picks.clear(); refresh(); };
document.getElementById('copyBtn').onclick=()=>{
  const ta=document.getElementById('picktext'); ta.style.display='block'; ta.select();
  try{ navigator.clipboard.writeText(ta.value); document.getElementById('copyBtn').textContent='Copied ✓'; setTimeout(()=>document.getElementById('copyBtn').textContent='Copy picks',1500);}catch(e){}
};
refresh();
</script>
</body>
</html>
